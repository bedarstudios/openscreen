name: Stale needs-review
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const DAY_MS = 24 * 60 * 60 * 1000;
            const { data: prs } = await github.rest.pulls.list({
              ...context.repo, state: 'open', per_page: 100 });
            for (const pr of prs) {
              const names = pr.labels.map(l => l.name);
              const waiting = names.includes('needs-review') &&
                !names.includes('review-passed') && !names.includes('needs-human');
              const isStale = waiting &&
                (Date.now() - new Date(pr.updated_at).getTime() > DAY_MS);
              if (isStale && !names.includes('stale')) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number: pr.number, labels: ['stale'] });
                core.info(`PR #${pr.number} marked stale`);
              } else if (!isStale && names.includes('stale')) {
                await github.rest.issues.removeLabel({
                  ...context.repo, issue_number: pr.number, name: 'stale' }).catch(() => {});
                core.info(`PR #${pr.number} unmarked stale`);
              }
            }
